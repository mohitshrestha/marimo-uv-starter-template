<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohit Shrestha | Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-blue-100">

    <div class="max-w-7xl mx-auto px-6 py-10">
        {% include 'partials/header.html' %}

        <section class="flex flex-col lg:flex-row items-center justify-between gap-6 mb-12 py-8 border-y border-slate-200">
            <div id="filter-buttons" class="flex flex-wrap gap-3">
                <button data-filter="all" class="filter-btn active">
                    All <span class="opacity-50 ml-1 text-xs">{{ counts.all }}</span>
                </button>
                <button data-filter="apps" class="filter-btn">
                    Apps <span class="opacity-50 ml-1 text-xs">{{ counts.apps }}</span>
                </button>
                <button data-filter="notebooks" class="filter-btn">
                    Notebooks <span class="opacity-50 ml-1 text-xs">{{ counts.notebooks }}</span>
                </button>
            </div>

            <div class="flex items-center gap-4 w-full lg:w-auto">
                <input type="text" id="search-input" placeholder="Search projects..." 
                    class="w-full lg:w-72 px-5 py-3 rounded-2xl border-2 border-slate-100 focus:border-blue-500 outline-none transition-all shadow-sm">
                
                <select id="sort-select" class="px-4 py-3 border-2 border-slate-100 rounded-2xl font-bold text-sm text-slate-600 outline-none cursor-pointer">
                    <option value="featured">Featured First</option>
                    <option value="az">Name (A-Z)</option>
                </select>
            </div>
        </section>

        <main id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            {% for item in items %}
                {% include 'partials/card.html' %}
            {% endfor %}
        </main>

        {% include 'partials/footer.html' %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const sortSelect = document.getElementById('sort-select');
            const grid = document.getElementById('project-grid');
            
            let currentFilter = 'all';

            function updateUI() {
                const term = searchInput.value.toLowerCase();
                const cards = document.querySelectorAll('.project-card');

                cards.forEach(card => {
                    const matchesSearch = card.dataset.search.includes(term);
                    const matchesFilter = currentFilter === 'all' || card.dataset.category === currentFilter;
                    card.style.display = (matchesSearch && matchesFilter) ? 'flex' : 'none';
                });
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    updateUI();
                });
            });

            sortSelect.addEventListener('change', () => {
                const cards = Array.from(document.querySelectorAll('.project-card'));
                const sorted = cards.sort((a, b) => {
                    if (sortSelect.value === 'featured') {
                        const featA = a.dataset.featured === 'True' ? 0 : 1;
                        const featB = b.dataset.featured === 'True' ? 0 : 1;
                        return featA - featB;
                    }
                    return a.querySelector('h3').textContent.localeCompare(b.querySelector('h3').textContent);
                });
                sorted.forEach(c => grid.appendChild(c));
            });

            searchInput.addEventListener('input', updateUI);
        });
    </script>
</body>
</html>
