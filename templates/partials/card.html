<div class="project-card group bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden hover:shadow-2xl hover:-translate-y-2 transition-all duration-500"
     data-category="{{ item.category }}"
     data-featured="{{ item.featured }}"
     data-search="{{ item.title.lower() }} {{ item.category.lower() }} {{ item.tags | join(' ') | lower }}">
    
    <div class="aspect-video bg-slate-100 relative overflow-hidden">
        {% if item.thumbnail_url %}
            <img src="{{ item.thumbnail_url }}" alt="{{ item.title }}" loading="lazy"
                 class="object-cover w-full h-full group-hover:scale-110 transition-transform duration-1000">
        {% else %}
            <div class="flex items-center justify-center h-full bg-slate-50 text-slate-200 font-black text-2xl italic tracking-tighter">MARIMO</div>
        {% endif %}
        
        <div class="absolute top-6 left-6 flex gap-2">
            <span class="px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm uppercase tracking-widest border backdrop-blur-md
                {% if item.category.lower() == 'apps' %} bg-amber-50/90 text-amber-600 border-amber-100 
                {% else %} bg-blue-50/90 text-blue-600 border-blue-100 {% endif %}">
                {{ item.category }}
            </span>
            {% if item.featured %}
            <span class="bg-indigo-600 text-white px-3 py-1.5 rounded-full text-[10px] font-bold uppercase shadow-lg">★ Featured</span>
            {% endif %}
        </div>
    </div>

    <div class="p-8">
        <h3 class="text-2xl font-bold mb-3 text-slate-800 group-hover:text-blue-600 transition-colors">{{ item.title }}</h3>
        <p class="text-slate-500 text-sm line-clamp-2 h-10 mb-8">{{ item.description }}</p>

        <a href="{{ item.url }}" 
           class="flex items-center justify-center w-full py-4 rounded-2xl text-sm font-bold transition-all
            {% if item.category.lower() == 'apps' %} bg-amber-500 text-white hover:bg-amber-600 
            {% else %} bg-blue-600 text-white hover:bg-blue-700 {% endif %}">
            Launch {{ "App" if item.category.lower() == 'apps' else "Notebook" }}
        </a>
    </div>
</div>
