<article class="project-card flex flex-col rounded-[2.5rem] overflow-hidden group shadow-sm"
         data-category="{{ item.category }}"
         data-featured="{{ item.meta.featured }}"
         data-search="{{ item.meta.title.lower() }} {{ item.meta.tags | join(' ') | lower }}">
    
    <div class="aspect-video bg-slate-100 relative overflow-hidden">
        <div class="absolute top-5 left-5 z-10 flex gap-2">
            <span class="px-3 py-1 rounded-full bg-white/90 backdrop-blur-md text-[10px] font-black uppercase tracking-widest text-blue-600 shadow-sm">
                {{ item.category }}
            </span>
            {% if item.meta.featured %}
                <span class="px-3 py-1 rounded-full bg-amber-400 text-amber-900 text-[10px] font-black uppercase tracking-widest shadow-sm">
                    ★ Featured
                </span>
            {% endif %}
        </div>
        <div class="absolute inset-0 bg-gradient-to-br from-slate-200 to-slate-300 group-hover:scale-105 transition-transform duration-700"></div>
    </div>

    <div class="p-8 flex flex-col flex-grow">
        <h3 class="text-2xl font-bold text-slate-800 mb-2 group-hover:text-blue-600 transition-colors">
            {{ item.meta.title }}
        </h3>
        <p class="text-slate-500 text-sm leading-relaxed mb-6 line-clamp-2">
            {{ item.meta.description }}
        </p>
        <div class="mt-auto">
            <a href="{{ item.url }}" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="flex items-center justify-center w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-blue-600 transition-all shadow-md active:scale-95">
                Launch Project
            </a>
        </div>
    </div>
</article>
